# Non-secret bootstrap defaults for local development.
# Secrets must be provided via environment variables or admin runtime configuration.

environment: development
backend:
  host: 0.0.0.0
  port: 8000
  log_level: INFO
  sync_cron_hour: 2
  sync_cron_minute: 0
  lookback_days: 730

gitlab:
  base_url: https://gitlab.plunet.com
  # Same as POC: URL path segment after host (e.g. https://gitlab.plunet.com/dev/plunet/-/tags → dev/plunet)
  project_paths:
    - dev/plunet
  target_branches:
    - master
    - 9.x
    - 10.x
    - 11.x
  # Extra lines where merged MRs should be ingested (patch/customer branches). Duplicates vs target_branches are ignored.
  additional_merge_target_branches: []
  non_customer_release_markers:
    - rc
    - beta
  exclude_release_only_mrs_from_lead_time: true
  release_mr_title_markers:
    - " release"
  release_mr_source_branch_markers:
    - release

jira:
  base_url: https://plunet.atlassian.net
  excluded_projects: [DEVOPS, JIRATESTS]
  ready_for_qa_status_names:
    - Ready for QA
  production_bug_indicator_cf_ids: ["10114", "10123"]

notifications:
  webhook_url: null
