# DORA Metrics – Docker Compose stack
#
# Services:  db (PostgreSQL 16), backend (FastAPI/uvicorn), frontend (Next.js)
# Proxy/TLS: Caddy runs on the host – NOT inside this Compose file (per spec).
#
# Usage:
#   cp .env.docker.example .env        # fill in real secrets
#   docker compose up --build -d
#
# All secrets are consumed from the .env file at runtime.
# Never bake credentials into images or commit a filled-in .env.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dora_metrics}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dora_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dora} -d ${POSTGRES_DB:-dora_metrics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DATABASE_URL so it points to the db service on the internal network
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-dora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dora_metrics}
      # Repo-root YAML is not in the image; mount it so defaults (e.g. gitlab.project_paths) load.
      DORA_CONFIG_PATH: /app/configuration.yml
    volumes:
      - ./configuration.yml:/app/configuration.yml:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - dora_net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_API_URL is baked at build time.
        # Set to the public-facing URL Caddy exposes for the backend API, e.g.:
        #   https://dora.example.com/api
        # or leave the default for localhost-only setups:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - dora_net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:

networks:
  dora_net:
    driver: bridge
