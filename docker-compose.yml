# DORA Metrics – Docker Compose stack
#
# Services:  db (PostgreSQL 16), backend (FastAPI/uvicorn), frontend (Next.js)
# Proxy/TLS: Caddy runs on the host – NOT inside this Compose file (per spec).
#
# Usage:
#   cp .env.docker.example .env        # fill in real secrets
#   docker compose up --build -d
#
# All secrets are consumed from the .env file at runtime.
# Never bake credentials into images or commit a filled-in .env.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dora_metrics}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dora_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dora} -d ${POSTGRES_DB:-dora_metrics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DATABASE_URL so it points to the db service on the internal network
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-dora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dora_metrics}
      # Repo-root YAML is not in the image; mount it so defaults (e.g. gitlab.project_paths) load.
      DORA_CONFIG_PATH: /app/configuration.yml
    volumes:
      - ./configuration.yml:/app/configuration.yml:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - dora_net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # python:3.12-slim has no wget/curl; use stdlib
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\", timeout=5)"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_API_URL is baked at build time.
        # Use a relative path (/api) so the browser goes through the Next.js
        # proxy rewrite, keeping the session cookie on the same origin.
        # For a Caddy-fronted production setup use: https://dora.example.com/api
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        # BACKEND_INTERNAL_URL is also baked at build time into the rewrite rules
        # so the Next.js server knows how to reach the backend from inside Docker.
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - dora_net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1: some images resolve localhost before the listener is ready
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:

networks:
  dora_net:
    driver: bridge
