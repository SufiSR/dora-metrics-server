[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = []

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
strict_equality = true
exclude = ["tests/"]

[tool.pytest.ini_options]
markers = [
    "integration: Docker + testcontainers PostgreSQL; run from backend/ (alembic.ini path)",
]
